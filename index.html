<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>Novena - 技术文档</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>

<body>
    <div id="app">加载中...</div>
    <script>
        window.$docsify = {
            name: 'Novena',
            repo: 'https://github.com/kyleexu/novena',
            loadSidebar: true,
            subMaxLevel: 3,
            maxLevel: 4,
            search: {
                placeholder: '搜索',
                noData: '没有结果',
                paths: 'auto'
            },
            auto2top: true,
            coverpage: false,
            executeScript: true,
            plugins: [
                function (hook, vm) {
                    hook.init(function () {
                        // 动态控制侧边栏显示
                        function toggleSidebar() {
                            const sidebar = document.querySelector('.sidebar');
                            const content = document.querySelector('.content');
                            const isHomePage = window.location.hash === '#/' || window.location.hash === '';

                            if (sidebar && content) {
                                if (isHomePage) {
                                    // 首页：隐藏侧边栏，内容占满
                                    sidebar.style.display = 'none';
                                    content.style.left = '0';
                                    content.style.maxWidth = 'none';
                                    content.style.padding = '30px 15px 40px';
                                } else {
                                    // 子页面：显示侧边栏
                                    sidebar.style.display = 'block';
                                    content.style.left = '300px';
                                    content.style.maxWidth = '800px';
                                    content.style.padding = '30px 15px 40px 15px';
                                }
                            }
                        }

                        // 监听路由变化
                        window.addEventListener('hashchange', toggleSidebar);
                        // 初始加载时也执行一次
                        setTimeout(toggleSidebar, 100);
                    });

                    hook.beforeEach(function (html, next) {
                        // 如果不是首页，在内容顶部添加返回首页链接
                        if (vm.route.path !== '/') {
                            html = '<div class="custom-nav"><a href="#/" class="back-home">🏠 返回首页</a></div>\n\n' + html;
                        }
                        next(html);
                    });

                    hook.doneEach(function () {
                        // 添加自定义样式
                        if (!document.querySelector('#custom-nav-style')) {
                            const style = document.createElement('style');
                            style.id = 'custom-nav-style';
                            style.textContent = `
                                .custom-nav {
                                    background: #f8f9fa;
                                    padding: 10px 15px;
                                    border-radius: 4px;
                                    border-left: 4px solid #42b983;
                                    margin-bottom: 20px;
                                }
                                .back-home {
                                    color: #42b983;
                                    text-decoration: none;
                                    font-weight: 500;
                                    font-size: 14px;
                                }
                                .back-home:hover {
                                    color: #369870;
                                    text-decoration: underline;
                                }
                                /* 首页样式优化 */
                                .content {
                                    transition: left 0.25s ease-in-out;
                                }
                            `;
                            document.head.appendChild(style);
                        }

                        // 确保在页面加载完成后调整布局
                        setTimeout(() => {
                            const isHomePage = window.location.hash === '#/' || window.location.hash === '';
                            const sidebar = document.querySelector('.sidebar');
                            const content = document.querySelector('.content');

                            if (sidebar && content) {
                                if (isHomePage) {
                                    sidebar.style.display = 'none';
                                    content.style.left = '0';
                                    content.style.maxWidth = 'none';
                                } else {
                                    sidebar.style.display = 'block';
                                    content.style.left = '300px';
                                    content.style.maxWidth = '800px';
                                }
                            }
                        }, 50);
                    });
                }
            ]
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
</body>

</html>

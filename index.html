<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>Novena - 技术文档</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>

<body>
    <div id="app">加载中...</div>
    <script>
        window.$docsify = {
            name: 'Novena',
            repo: 'https://github.com/kyleexu/novena',
            loadSidebar: true,
            subMaxLevel: 0,
            autoHeader: false,
            search: {
                placeholder: '搜索',
                noData: '没有结果',
                paths: 'auto'
            },
            auto2top: true,
            coverpage: false
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
</body>

</html>
